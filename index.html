<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flight Checklists — Tec Solution Pro</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy: #1b3a52;
      --blue: #25567a;
      --mid:  #2e7da6;
      --border: #c8dce8;
      --bg:   #f2f6f9;
      --white: #ffffff;
      --text: #1a202c;
      --muted: #5a7385;
    }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background-color: var(--bg);
      background-image: url('tec_solution_pro_logo.jpg');
      background-repeat: no-repeat;
      background-position: center center;
      background-attachment: fixed;
      background-size: 380px 380px;
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: rgba(241,244,249,0.93);
      z-index: 0;
      pointer-events: none;
    }

    .wrapper {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 540px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 32px;
    }
    .brand img {
      width: 64px; height: 64px;
      border-radius: 10px;
      object-fit: contain;
      background: white;
      padding: 5px;
      box-shadow: 0 3px 10px rgba(0,0,0,0.2);
    }
    .brand-text {}
    .brand-label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--muted);
      font-weight: 600;
      margin-bottom: 3px;
    }
    .brand-name {
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--navy);
    }

    h1 {
      font-size: 1rem;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1.5px;
      margin-bottom: 16px;
    }

    .cards {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .checklist-link {
      display: flex;
      align-items: center;
      gap: 20px;
      background: var(--white);
      border-radius: 10px;
      padding: 20px 24px;
      text-decoration: none;
      color: var(--text);
      box-shadow: 0 1px 4px rgba(0,0,0,0.07), 0 0 0 1px var(--border);
      transition: box-shadow 0.15s, transform 0.1s;
    }
    .checklist-link:hover {
      box-shadow: 0 4px 16px rgba(0,0,0,0.12), 0 0 0 1px var(--mid);
      transform: translateY(-1px);
    }

    .link-icon {
      width: 44px; height: 44px;
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.4rem;
      flex-shrink: 0;
    }
    .icon-pre  { background: #e8f4fd; }
    .icon-post { background: #edfaf3; }

    .link-body {}
    .link-title {
      font-size: 1rem;
      font-weight: 700;
      color: var(--navy);
      margin-bottom: 3px;
    }
    .link-desc {
      font-size: 0.8rem;
      color: var(--muted);
    }

    .link-arrow {
      margin-left: auto;
      color: var(--border);
      font-size: 1.2rem;
      flex-shrink: 0;
    }

    footer {
      position: relative;
      z-index: 1;
      margin-top: 32px;
      font-size: 0.72rem;
      color: #94a3b8;
      text-align: center;
    }
  </style>
</head>
<body>

<div class="wrapper">
  <div class="brand">
    <img src="tec_solution_pro_logo.jpg" alt="Tec Solution Pro" />
    <div class="brand-text">
      <div class="brand-label">Tec Solution Pro</div>
      <div class="brand-name">Drone Operations</div>
    </div>
  </div>

  <h1>Select Checklist</h1>

  <div class="cards">
    <a href="pre-flight.html" class="checklist-link">
      <div class="link-icon icon-pre">&#9992;</div>
      <div class="link-body">
        <div class="link-title">Pre-Flight Checklist</div>
        <div class="link-desc">Complete all sections before departure</div>
      </div>
      <div class="link-arrow">&#8250;</div>
    </a>

    <a href="post-flight.html" class="checklist-link">
      <div class="link-icon icon-post">&#10003;</div>
      <div class="link-body">
        <div class="link-title">Post-Flight Checklist</div>
        <div class="link-desc">Complete all sections after mission</div>
      </div>
      <div class="link-arrow">&#8250;</div>
    </a>
  </div>
</div>

<footer>Tec Solution Pro &nbsp;&mdash;&nbsp; DJI Matrice 400 &amp; Mavic 3 Multispectral</footer>

</body>
</html>
